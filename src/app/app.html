<!--Display a red star image-->
<img (dblclick)="dblClickToggle()"
  src="https://upload.wikimedia.org/wikipedia/commons/3/34/Red_star.svg"
  height="42"
  width="42"
  alt="Red star"
/>
<!--Create a message that is only shown when the star is double-clicked-->
<h2 [hidden]="!showMessage">Look at the star</h2>
<h4 [hidden]="!showMessage">Look at the star</h4>

<br/>
<!--Create a button that increments the count when clicked-->
<button (click)="IncrementCount()">
  Press Me
</button>
<!--Display the count in a heading-->
<h1>The Number of times the button has been pressed is: {{ count }}</h1>
